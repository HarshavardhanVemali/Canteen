<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=portrait">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Food Hub Restaurant Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<style>
* {
    -webkit-tap-highlight-color: transparent;
    outline: none;
}
button, a, img {
    outline: none;
}

body {
    font-family: 'Lato', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #fff;
    min-height: 100vh;
    width: fit-content;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    width: 100%;
}

header {
    position: relative;
    max-height: 380px;
    overflow: hidden;
}

header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

header::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
}

header h1 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    margin: 0;
    font-size: 32px;
    font-weight: 800;
}
header h1 img{
    width: 100px;
}
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 50%;
    margin-top: 20px;
}

.login-container {
    border-radius: 10px;
    padding: 40px;
    max-width: 350px;
    text-align: center;
    padding-top: 60px;
    margin: 0 auto;
}
h2 {
    color: #000;
    margin-bottom: 15px;
    font-size: 24px;
    margin-top: 10px !important;
}

.form-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: #333;
}

input[type="text"],
input[type="password"]{
    width: 100%;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 16px;
    outline: none;
    box-shadow: 1px rgba(0, 0, 0, 0.2);
}
.fa.fa-eye, .fa.fa-eye-slash{
    position: absolute;
    top: 50%;
    right: 15px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #777;
}
#password-field{
    position: relative;
}

button {
    background-color: #f05454;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    width: 100%;
}
.error-message {
    color: #dc3545; 
    margin-bottom: 10px;
    font-size: 14px; 
    text-align:center;
}
.forgot-password {
    display: block;
    margin: 10px 0px;
    text-align: right;
    color: #777; 
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.3s ease;
}

.forgot-password:hover {
    color: #f05454;
    text-decoration: underline;
}

button:active{
      background: #e04040;
      opacity: .8;
}
button[disabled] {
    opacity: 0.6;
    pointer-events: none;
    cursor: not-allowed;
}
@media (max-width: 480px) {
    header h1 {
        font-size: 28px;
    }
    .login-form {
        padding: 20px;
    }
}
</style>
<body>
    <header>
        <img src="{% static '/images/apploginbanner.webp' %}" alt="Food Hub Header">
         <h1 style="display: flex;align-items: center;flex-direction: column;gap: 2px;"><img src="{% static '/images/foodhublogo.png' %}" alt="">MVGRCE<span style="font-size: 6px;">Captive Hospitality Services</span></h1> 
    </header>
    <div class="login-container">
        {% if error_message %}
            <p class="error-message">{{ error_message }}</p>
        {% endif %}
        <form method="post" class="form1" {% if blocked %}disabled{% endif %}>
            {% csrf_token %}
            <div class="form-group">
                <input type="text" id="email" name="email" placeholder="Email" autocomplete="off" required>
            </div>
            <div class="form-group" id="password-field">
                <input type="password" id="password" name="password" placeholder="Password" autocomplete="off" required>
                <span class="toggle-password" onclick="togglePasswordVisibility()">
                    <i class="fa fa-eye"></i>
                </span>                    
            </div>   
            <a href="#" class="forgot-password">Forgot Password?</a>             
            <button type="submit" class="btn-login" {% if blocked %}disabled{% endif %}>Login</button>
        </form>            
    </div> 
</body>
<script>
    function togglePasswordVisibility() {
        var passwordField = document.getElementById("password");
        var icon = document.querySelector(".toggle-password i");

        if (passwordField.type === "password") {
            passwordField.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            passwordField.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }
</script> 
</html>
